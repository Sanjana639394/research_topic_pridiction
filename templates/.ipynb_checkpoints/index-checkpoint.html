<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Topic Prediction</title>
</head>
<body>
    <h1>Research Topic Prediction</h1>
    <form id="predictionForm">
        <label for="text">Enter Title and Abstract:</label><br>
        <textarea id="text" name="text" rows="10" cols="50"></textarea><br><br>
        <input type="submit" value="Predict">
    </form>

    <h2>Prediction Result:</h2>
    <div id="result"></div>

    <script>
        document.getElementById('predictionForm').onsubmit = async function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            document.getElementById('result').innerText = JSON.stringify(result, null, 2);
        };
    </script>
</body>
</html>
